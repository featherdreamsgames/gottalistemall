<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pokémon JSON Generator</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 400px; }
    button { padding: 10px 20px; font-size: 16px; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Pokémon Terms JSON Generator</h2>
<p>Paste your CSV list below and click Download JSON.</p>

<textarea id="input"></textarea>
<br>
<button onclick="generate()">Download JSON</button>

<script>
function generate() {
  const raw = document.getElementById("input").value.trim();
  if (!raw) {
    alert("Please paste your list first.");
    return;
  }

  const lines = raw.split("\n").slice(1); // Skip header
  const terms = {};

  lines.forEach(line => {
    if (!line.trim()) return;

    const parts = line.split(",");
    const number = parseInt(parts[0], 10);
    const name = parts[1].trim();
    const form = parts.length > 2 ? parts.slice(2).join(",").trim() : null;

    const key = name
      .toLowerCase()
      .replace(/♀/g, "-f")
      .replace(/♂/g, "-m")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-|-$/g, "");

    if (!terms[key]) {
      terms[key] = {
        number: number,
        display: name,
        subs: form ? [form] : null
      };
    } else if (form) {
      if (!terms[key].subs) terms[key].subs = [];
      terms[key].subs.push(form);
    }
  });

  const blob = new Blob(
    [JSON.stringify(terms, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "terms.json";
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
